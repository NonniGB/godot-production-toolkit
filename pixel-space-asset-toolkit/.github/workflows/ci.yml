name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: python -m pip install -e .
      - name: Unit tests
        run: python -m unittest discover -s tests -v
      - name: Generate sample starfield
        run: pixel-space-assets starfield --width 64 --height 64 --seed 1 --stars 20 --output generated/starfield.png --manifest generated/starfield.json
