name: Godot Release Dashboard
description: Build and upload a static release evidence dashboard from existing Godot Production Toolkit reports.

inputs:
  reports-dir:
    description: Directory containing JSON, Markdown, HTML, SVG, or PNG reports from earlier toolkit jobs.
    required: false
    default: "reports/release-evidence"
  dashboard-dir:
    description: Directory where the generated dashboard files are written.
    required: false
    default: "reports/release-dashboard"
  dashboard-title:
    description: Title shown at the top of the dashboard.
    required: false
    default: "Godot Release Evidence"
  dashboard-description:
    description: Optional short description shown under the dashboard title.
    required: false
    default: ""
  project:
    description: Optional project name shown in dashboard metadata.
    required: false
    default: ""
  previous-reports-dir:
    description: Optional previous report folder used for trend cards.
    required: false
    default: ""
  artifact-name:
    description: Name for the uploaded dashboard artifact.
    required: false
    default: "release-dashboard"
  upload-artifact:
    description: Whether to upload the dashboard directory as a workflow artifact.
    required: false
    default: "true"
  python-version:
    description: Python version used to install and run the dashboard builder.
    required: false
    default: "3.11"
  tool-packages:
    description: Space-separated packages to install before building the dashboard.
    required: false
    default: "godot-release-dashboard-kit"
  extra-args:
    description: Optional extra arguments passed to each dashboard build command.
    required: false
    default: ""

outputs:
  dashboard-html:
    description: Path to the generated HTML dashboard.
    value: ${{ steps.paths.outputs.dashboard-html }}
  dashboard-json:
    description: Path to the generated JSON dashboard summary.
    value: ${{ steps.paths.outputs.dashboard-json }}

runs:
  using: composite
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}

    - name: Install dashboard package
      shell: bash
      env:
        TOOL_PACKAGES: ${{ inputs.tool-packages }}
      run: |
        set -euo pipefail
        python -m pip install --upgrade pip
        mapfile -d '' tool_packages < <(python -c 'import os, shlex, sys; [sys.stdout.buffer.write(arg.encode() + b"\0") for arg in shlex.split(os.environ.get("TOOL_PACKAGES", ""))]')
        if [ "${#tool_packages[@]}" -eq 0 ]; then
          echo "tool-packages must name at least one package." >&2
          exit 2
        fi
        python -m pip install "${tool_packages[@]}"

    - name: Prepare dashboard paths
      id: paths
      shell: bash
      env:
        DASHBOARD_DIR: ${{ inputs.dashboard-dir }}
      run: |
        set -euo pipefail
        mkdir -p "$DASHBOARD_DIR"
        echo "dashboard-html=$DASHBOARD_DIR/index.html" >> "$GITHUB_OUTPUT"
        echo "dashboard-json=$DASHBOARD_DIR/dashboard.json" >> "$GITHUB_OUTPUT"

    - name: Build release dashboard
      shell: bash
      env:
        REPORTS_DIR: ${{ inputs.reports-dir }}
        DASHBOARD_TITLE: ${{ inputs.dashboard-title }}
        DASHBOARD_DESCRIPTION: ${{ inputs.dashboard-description }}
        PROJECT_NAME: ${{ inputs.project }}
        PREVIOUS_REPORTS_DIR: ${{ inputs.previous-reports-dir }}
        EXTRA_ARGS: ${{ inputs.extra-args }}
      run: |
        set -euo pipefail
        previous_arg=()
        if [ -n "$PREVIOUS_REPORTS_DIR" ]; then
          previous_arg=(--previous-reports-dir "$PREVIOUS_REPORTS_DIR")
        fi

        description_arg=()
        if [ -n "$DASHBOARD_DESCRIPTION" ]; then
          description_arg=(--description "$DASHBOARD_DESCRIPTION")
        fi

        project_arg=()
        if [ -n "$PROJECT_NAME" ]; then
          project_arg=(--project "$PROJECT_NAME")
        fi

        mapfile -d '' extra_args < <(python -c 'import os, shlex, sys; [sys.stdout.buffer.write(arg.encode() + b"\0") for arg in shlex.split(os.environ.get("EXTRA_ARGS", ""))]')

        godot-release-dashboard build "$REPORTS_DIR" \
          "${previous_arg[@]}" \
          "${description_arg[@]}" \
          "${project_arg[@]}" \
          --title "$DASHBOARD_TITLE" \
          --output "${{ steps.paths.outputs.dashboard-html }}" \
          "${extra_args[@]}"

        godot-release-dashboard build "$REPORTS_DIR" \
          "${previous_arg[@]}" \
          "${description_arg[@]}" \
          "${project_arg[@]}" \
          --title "$DASHBOARD_TITLE" \
          --format json \
          --output "${{ steps.paths.outputs.dashboard-json }}" \
          "${extra_args[@]}"

    - name: Upload release dashboard
      if: inputs.upload-artifact == 'true'
      uses: actions/upload-artifact@v4
      with:
        name: ${{ inputs.artifact-name }}
        path: ${{ inputs.dashboard-dir }}
