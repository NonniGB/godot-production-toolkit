# Example only. Copy this file to .github/workflows/release-dashboard-artifact.yml
# in a Godot game repository before enabling it.
name: Release dashboard artifact

on:
  workflow_dispatch:

env:
  REPORTS_DIR: "reports/release-evidence"
  DASHBOARD_DIR: "reports/release-dashboard"
  DASHBOARD_TITLE: "Godot Release Evidence"

jobs:
  release-dashboard:
    runs-on: ubuntu-latest
    steps:
      - name: Check out project
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Download report artifacts from earlier jobs
        uses: actions/download-artifact@v4
        with:
          # Required artifact pattern: make producer jobs upload reports with a
          # shared suffix such as "-reports".
          pattern: "*-reports"
          path: ${{ env.REPORTS_DIR }}
          merge-multiple: true

      - name: Build and upload release dashboard
        uses: NonniGB/godot-production-toolkit/godot-release-dashboard-action@06d66f390a45743b4437d09bc63eb8778b52c0a4
        with:
          # Required project artifact: REPORTS_DIR should contain JSON,
          # Markdown, PNG, SVG, or HTML reports from earlier toolkit jobs.
          reports-dir: ${{ env.REPORTS_DIR }}
          dashboard-dir: ${{ env.DASHBOARD_DIR }}
          dashboard-title: ${{ env.DASHBOARD_TITLE }}
          artifact-name: release-dashboard
