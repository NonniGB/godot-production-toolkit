name: Feature request
description: Suggest a focused improvement for one of the tools.
title: "[feature]: "
labels: ["enhancement", "needs-triage"]
body:
  - type: dropdown
    id: tool
    attributes:
      label: Tool
      description: Which tool would this improve?
      options:
        - godot-project-doctor
        - godot-asset-pipeline-doctor
        - godot-export-preset-doctor
        - gdscript-api-comment-coverage
        - godot-input-map-auditor
        - godot-localization-qa-guard
        - godot-save-schema-guard
        - godot-scene-signal-auditor
        - godot-visual-smoke-test-kit
        - godot-mobile-perf-doctor
        - pixel-space-asset-toolkit
        - godot-ci-doctor-action
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What workflow is currently hard, risky, or impossible?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
      description: Describe the command, output, or documentation change you would expect.
    validations:
      required: true
