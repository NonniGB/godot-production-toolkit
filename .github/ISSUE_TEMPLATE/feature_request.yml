name: Feature request
description: Suggest a focused improvement for one of the tools.
title: "[feature]: "
labels: ["enhancement", "needs-triage"]
body:
  - type: dropdown
    id: tool
    attributes:
      label: Tool
      description: Which tool would this improve?
      options:
        - godot-project-doctor
        - godot-asset-pipeline-doctor
        - godot-content-graph-doctor
        - godot-export-preset-doctor
        - godot-gdscript-architecture-guard
        - gdscript-api-comment-coverage
        - godot-input-map-auditor
        - godot-localization-qa-guard
        - godot-mobile-ui-doctor
        - godot-pack-mod-doctor
        - godot-release-dashboard-kit
        - godot-runtime-telemetry-lab
        - godot-save-schema-guard
        - godot-scenario-report-kit
        - godot-scene-signal-auditor
        - godot-visual-smoke-test-kit
        - godot-mobile-perf-doctor
        - pixel-space-asset-toolkit
        - godot-ci-doctor-action
        - godot-release-dashboard-action
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Workflow or problem
      description: What release, CI, asset, localization, input, save, or mobile workflow is currently hard, risky, or repetitive?
      placeholder: |
        I am trying to...
        The tool currently makes this hard because...
        I currently work around it by...
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
      description: Describe the command, output, rule, config option, or documentation change you would expect.
      placeholder: |
        Example command:
          godot-asset-doctor . --profile pixel-2d --new-option ...

        Expected output/report:
          It should flag...
    validations:
      required: true
  - type: textarea
    id: example
    attributes:
      label: Example project shape
      description: Optional, but useful. Paste a tiny file tree, config snippet, or CI step that shows where the feature would fit.
      placeholder: |
        project.godot
        export_presets.cfg
        assets/ui/button.png
        .github/workflows/release.yml
    validations:
      required: false
