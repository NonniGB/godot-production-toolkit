name: Publish gdscript-api-comment-coverage

on:
  workflow_dispatch:
  push:
    tags:
      - "gdscript-api-comment-coverage-v*"

permissions:
  contents: read

jobs:
  publish:
    name: Build and publish gdscript-api-comment-coverage
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tools
        run: python -m pip install --upgrade build twine

      - name: Build package
        run: python -m build gdscript-api-comment-coverage

      - name: Check package metadata
        run: python -m twine check gdscript-api-comment-coverage/dist/*

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: gdscript-api-comment-coverage/dist
