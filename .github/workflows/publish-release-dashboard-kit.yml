name: Publish godot-release-dashboard-kit

on:
  workflow_dispatch:
  push:
    tags:
      - "godot-release-dashboard-kit-v*"

permissions:
  contents: read

jobs:
  publish:
    name: Validate, build, and publish godot-release-dashboard-kit
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"

      - name: Verify selected package and tag
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            python resolve_publish_package.py --manual-package godot-release-dashboard-kit
          else
            python resolve_publish_package.py --ref-name "$REF_NAME"
          fi

      - name: Install suite and build dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip build twine jsonschema
          for project in */pyproject.toml; do
            python -m pip install -e "${project%/pyproject.toml}"
          done

      - name: Run release gates
        shell: bash
        run: |
          python verify_tool_manifests.py
          python verify_release_alignment.py
          python verify_cli_smoke.py
          python -m unittest discover -s tests -v
          for tests_dir in */tests; do
            python -m unittest discover -s "$tests_dir" -v
          done

      - name: Build and check package
        run: |
          python -m build godot-release-dashboard-kit
          python -m twine check godot-release-dashboard-kit/dist/*

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@ba38be9e461d3875417946c167d0b5f3d385a247
        with:
          packages-dir: godot-release-dashboard-kit/dist
