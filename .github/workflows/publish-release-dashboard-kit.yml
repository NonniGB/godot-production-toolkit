name: Publish godot-release-dashboard-kit

on:
  workflow_dispatch:
  push:
    tags:
      - "godot-release-dashboard-kit-v*"

permissions:
  contents: read

jobs:
  publish:
    name: Build and publish godot-release-dashboard-kit
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tools
        run: python -m pip install --upgrade build twine

      - name: Build package
        run: python -m build godot-release-dashboard-kit

      - name: Check package metadata
        run: python -m twine check godot-release-dashboard-kit/dist/*

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: godot-release-dashboard-kit/dist
