name: Publish Python Packages

on:
  workflow_dispatch:
    inputs:
      package:
        description: Package directory to publish
        required: true
        type: choice
        options:
          - godot-asset-pipeline-doctor
          - godot-export-preset-doctor
          - godot-mobile-perf-doctor

permissions:
  contents: read

jobs:
  publish:
    name: Build and publish ${{ inputs.package }}
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tools
        run: python -m pip install --upgrade build twine

      - name: Build package
        run: python -m build "${{ inputs.package }}"

      - name: Check package metadata
        run: python -m twine check "${{ inputs.package }}"/dist/*

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: ${{ inputs.package }}/dist
