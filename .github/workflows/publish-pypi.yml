name: Publish Python Packages

on:
  push:
    tags:
      - "godot-asset-pipeline-doctor-v*"
      - "godot-project-doctor-v*"
  workflow_dispatch:
    inputs:
      package:
        description: Package directory to publish
        required: true
        type: choice
        options:
          - godot-asset-pipeline-doctor
          - godot-export-preset-doctor
          - godot-mobile-perf-doctor
          - godot-project-doctor

permissions:
  contents: read

jobs:
  publish:
    name: Build and publish ${{ startsWith(github.ref_name, 'godot-project-doctor-v') && 'godot-project-doctor' || (startsWith(github.ref_name, 'godot-asset-pipeline-doctor-v') && 'godot-asset-pipeline-doctor' || inputs.package) }}
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: read
      id-token: write
    env:
      PACKAGE_DIR: ${{ startsWith(github.ref_name, 'godot-project-doctor-v') && 'godot-project-doctor' || (github.event_name == 'workflow_dispatch' && inputs.package || 'godot-asset-pipeline-doctor') }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tools
        run: python -m pip install --upgrade build twine

      - name: Build package
        run: python -m build "$PACKAGE_DIR"

      - name: Check package metadata
        run: python -m twine check "$PACKAGE_DIR"/dist/*

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: ${{ env.PACKAGE_DIR }}/dist
