name: Publish Python Package

on:
  push:
    tags:
      - "godot-asset-pipeline-doctor-v*"
      - "godot-production-doctor-v*"
  workflow_dispatch:
    inputs:
      package:
        description: Package directory to publish
        required: true
        type: choice
        options:
          - godot-asset-pipeline-doctor
          - godot-production-doctor

permissions:
  contents: read

jobs:
  publish:
    name: Validate, build, and publish selected package
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97
        with:
          python-version: "3.11"

      - name: Resolve package and verify tag/version alignment
        id: package
        shell: bash
        env:
          REF_NAME: ${{ github.ref_name }}
          MANUAL_PACKAGE: ${{ inputs.package || '' }}
        run: |
          set -euo pipefail
          resolved="$(python resolve_publish_package.py --ref-name "$REF_NAME" --manual-package "$MANUAL_PACKAGE")"
          echo "directory=${resolved%%|*}" >> "$GITHUB_OUTPUT"
          echo "version=${resolved#*|}" >> "$GITHUB_OUTPUT"

      - name: Install validation and build tools
        run: python -m pip install --upgrade build twine jsonschema

      - name: Install suite packages
        shell: bash
        run: |
          for project in */pyproject.toml; do
            python -m pip install -e "${project%/pyproject.toml}"
          done

      - name: Run suite release gates
        run: |
          python verify_tool_manifests.py
          python verify_release_alignment.py
          python verify_cli_smoke.py
          python -m unittest discover -s tests -v

      - name: Run all package test suites
        shell: bash
        run: |
          for tests_dir in */tests; do
            python -m unittest discover -s "$tests_dir" -v
          done

      - name: Build and check selected package
        run: |
          python -m build "${{ steps.package.outputs.directory }}"
          python -m twine check "${{ steps.package.outputs.directory }}"/dist/*

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b
        with:
          packages-dir: ${{ steps.package.outputs.directory }}/dist
