name: Publish godot-visual-smoke-test-kit

on:
  workflow_dispatch:
  push:
    tags:
      - "godot-visual-smoke-test-kit-v*"

permissions:
  contents: read

jobs:
  publish:
    name: Build and publish godot-visual-smoke-test-kit
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tools
        run: python -m pip install --upgrade build twine

      - name: Build package
        run: python -m build godot-visual-smoke-test-kit

      - name: Check package metadata
        run: python -m twine check godot-visual-smoke-test-kit/dist/*

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: godot-visual-smoke-test-kit/dist
