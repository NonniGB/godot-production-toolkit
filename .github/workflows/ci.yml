name: Suite CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  validate:
    name: Validate tool suite
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          for project in */pyproject.toml; do
            dir="${project%/pyproject.toml}"
            python -m pip install -e "$dir"
          done

      - name: Validate tool manifests
        run: python verify_tool_manifests.py

      - name: Validate release alignment
        run: python verify_release_alignment.py

      - name: Run root tests
        run: python -m unittest discover -s tests -v

      - name: Run package test suites
        shell: bash
        run: |
          for tests_dir in */tests; do
            python -m unittest discover -s "$tests_dir" -v
          done

      - name: Build release package candidates
        shell: bash
        run: |
          python -m pip install --upgrade build twine
          for package in \
            godot-asset-pipeline-doctor \
            godot-export-preset-doctor \
            godot-mobile-perf-doctor
          do
            python -m build "$package"
            python -m twine check "$package"/dist/*
          done
