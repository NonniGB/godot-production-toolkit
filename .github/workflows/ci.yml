name: Suite CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  validate:
    name: Validate on Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.14"]
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip jsonschema
          for project in */pyproject.toml; do
            python -m pip install -e "${project%/pyproject.toml}"
          done

      - name: Validate manifests, releases, CLIs, and schemas
        run: |
          python verify_tool_manifests.py
          python verify_release_alignment.py
          python verify_cli_smoke.py
          python -m unittest discover -s tests -v

      - name: Run package test suites
        shell: bash
        run: |
          for tests_dir in */tests; do
            python -m unittest discover -s "$tests_dir" -v
          done

  wheel-smoke:
    name: Build and install every wheel
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: "3.11"

      - name: Build all distributions
        shell: bash
        run: |
          python -m pip install --upgrade build twine
          mkdir wheelhouse
          for project in */pyproject.toml; do
            package="${project%/pyproject.toml}"
            python -m build --outdir "$PWD/wheelhouse" "$package"
          done
          python -m twine check wheelhouse/*

      - name: Install wheels in a clean environment and smoke test CLIs
        shell: bash
        run: |
          python -m venv wheel-venv
          source wheel-venv/bin/activate
          python -m pip install --upgrade pip
          python -m pip install wheelhouse/*.whl
          python verify_cli_smoke.py --installed

  action-smoke:
    name: Run composite actions
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Run CI doctor action
        uses: ./godot-ci-doctor-action
        with:
          project: examples/release-readiness-demo
          config: examples/release-readiness-demo/godot-project-doctor.toml
          reports-dir: reports/action-smoke
          fail-on: none

      - name: Run dashboard action
        uses: ./godot-release-dashboard-action
        with:
          reports-dir: reports/action-smoke
          dashboard-dir: reports/action-dashboard
          upload-artifact: "false"
