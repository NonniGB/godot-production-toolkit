name: Godot CI Doctor
description: Run Godot CI and release evidence checks in GitHub Actions and write JSON, Markdown, and HTML reports.

inputs:
  project:
    description: Path to the Godot project directory.
    required: false
    default: "."
  config:
    description: Optional godot-project-doctor.toml path.
    required: false
    default: ""
  checks:
    description: Comma-separated check ids to run when no config supplies checks.
    required: false
    default: "assets,export,api_comments,input,localization,signals,mobile_perf"
  reports-dir:
    description: Directory where report artifacts are written.
    required: false
    default: "reports/godot-project-doctor"
  fail-on:
    description: Smallest severity that should fail the workflow.
    required: false
    default: "error"
  output-formats:
    description: Comma-separated summary formats to write. Supported values are json, markdown, and html.
    required: false
    default: "json,markdown,html"
  python-version:
    description: Python version used to install and run the tools.
    required: false
    default: "3.11"
  tool-packages:
    description: Space-separated packages to install before running the doctor.
    required: false
    default: "godot-production-doctor godot-asset-pipeline-doctor godot-export-preset-doctor gdscript-api-comment-coverage godot-input-map-auditor godot-localization-qa-guard godot-scene-signal-auditor godot-mobile-perf-doctor"

outputs:
  summary-json:
    description: Path to the JSON summary report.
    value: ${{ steps.paths.outputs.summary-json }}
  summary-markdown:
    description: Path to the Markdown summary report.
    value: ${{ steps.paths.outputs.summary-markdown }}
  summary-html:
    description: Path to the HTML summary report.
    value: ${{ steps.paths.outputs.summary-html }}

runs:
  using: composite
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}

    - name: Install doctor packages
      shell: bash
      env:
        TOOL_PACKAGES: ${{ inputs.tool-packages }}
      run: |
        set -euo pipefail
        python -m pip install --upgrade pip
        mapfile -d '' tool_packages < <(python -c 'import os, shlex, sys; [sys.stdout.buffer.write(arg.encode() + b"\0") for arg in shlex.split(os.environ.get("TOOL_PACKAGES", ""))]')
        if [ "${#tool_packages[@]}" -eq 0 ]; then
          echo "tool-packages must name at least one package." >&2
          exit 2
        fi
        python -m pip install "${tool_packages[@]}"

    - name: Prepare report paths
      id: paths
      shell: bash
      env:
        REPORTS_DIR: ${{ inputs.reports-dir }}
      run: |
        set -euo pipefail
        mkdir -p "$REPORTS_DIR"
        echo "summary-json=$REPORTS_DIR/summary.json" >> "$GITHUB_OUTPUT"
        echo "summary-markdown=$REPORTS_DIR/summary.md" >> "$GITHUB_OUTPUT"
        echo "summary-html=$REPORTS_DIR/summary.html" >> "$GITHUB_OUTPUT"

    - name: Run Godot project doctor
      shell: bash
      env:
        PROJECT_PATH: ${{ inputs.project }}
        CONFIG_PATH: ${{ inputs.config }}
        CHECKS: ${{ inputs.checks }}
        REPORTS_DIR: ${{ inputs.reports-dir }}
      run: |
        set -euo pipefail
        config_arg=()
        if [ -n "$CONFIG_PATH" ]; then
          config_arg=("$CONFIG_PATH")
        fi
        godot-project-doctor run "${config_arg[@]}" \
          --project "$PROJECT_PATH" \
          --checks "$CHECKS" \
          --reports-dir "$REPORTS_DIR" \
          --fail-on none \
          --format json \
          --output "${{ steps.paths.outputs.summary-json }}"

    - name: Write Markdown summary
      if: contains(inputs.output-formats, 'markdown')
      shell: bash
      env:
        REPORTS_DIR: ${{ inputs.reports-dir }}
      run: |
        set -euo pipefail
        godot-project-doctor summarize "$REPORTS_DIR" \
          --format markdown \
          --output "${{ steps.paths.outputs.summary-markdown }}" \
          --fail-on none

    - name: Write HTML summary
      if: contains(inputs.output-formats, 'html')
      shell: bash
      env:
        REPORTS_DIR: ${{ inputs.reports-dir }}
      run: |
        set -euo pipefail
        godot-project-doctor summarize "$REPORTS_DIR" \
          --format html \
          --output "${{ steps.paths.outputs.summary-html }}" \
          --fail-on none

    - name: Apply fail threshold
      shell: bash
      env:
        REPORTS_DIR: ${{ inputs.reports-dir }}
        FAIL_ON: ${{ inputs.fail-on }}
      run: |
        set -euo pipefail
        godot-project-doctor summarize "$REPORTS_DIR" \
          --format text \
          --fail-on "$FAIL_ON"
